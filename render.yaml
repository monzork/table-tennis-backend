services:
  - type: web
    name: table-tennis-backend
    env: docker
    plan: free # Can be 'free' because we use external Postgres
    region: ohio
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false # User will provide this from Neon/Supabase
      - key: ADMIN_USERNAME
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true # 32+ byte random secret for session signing
