<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Open TDM Nicaragua</title>
    <meta name="description" content="{{if .Description}}{{.Description}}{{else}}Official Open TDM Nicaragua rankings, athlete registration, and tournament management platform.{{end}}">
    <!-- Open Graph -->
    <meta property="og:title" content="{{.Title}} — Open TDM Nicaragua">
    <meta property="og:description" content="{{if .Description}}{{.Description}}{{else}}Official Open TDM Nicaragua rankings, athlete registration, and tournament management platform.{{end}}">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/open_tdm.jpeg">
    <meta property="og:site_name" content="Open TDM Nicaragua">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{.Title}} — Open TDM Nicaragua">
    <meta name="twitter:description" content="{{if .Description}}{{.Description}}{{else}}Official Open TDM Nicaragua rankings, athlete registration, and tournament management platform.{{end}}">
    <meta name="twitter:image" content="/open_tdm.jpeg">
    <script src="https://unpkg.com/htmx.org@1.9.3"></script>
    <script src="https://unpkg.com/htmx.org@1.9.3/dist/ext/ws.js"></script>
    <link href="/static/dist/tailwind.css?v=3" rel="stylesheet">
    <link id="font-outfit" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet" hx-preserve="true">
    <style>
        body { background-color: #0a0a0a; color: #fff; }
        .glass { background: rgba(18, 18, 18, 0.80); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.07); }
        .ranking-row:hover { background-color: rgba(255,255,255,0.04); transform: translateX(4px); transition: all 0.3s ease; box-shadow: -4px 0 0 rgba(255,255,255,0.6); }

        /* Language switcher */
        .lang-btn { transition: all 0.2s ease; }
        .lang-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.6); color: #fff; }

        /* Hide admin elements on public views */
        .proj-hide { display: none !important; }
        
        /* Hide scrollbar for nav */
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        /* Spinner for buttons / cards during HTMX requests */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator { display: inline-block; }
        
        #global-spinner.htmx-indicator { display: none; }
        .htmx-request #global-spinner.htmx-indicator,
        #global-spinner.htmx-indicator.htmx-request { display: flex; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased text-gray-200" hx-indicator="#global-spinner" hx-boost="true">
    <!-- Global HTMX Spinner Overlay -->
    <div id="global-spinner" class="htmx-indicator fixed inset-0 z-[9999] items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity">
        <div class="bg-black/60 p-6 rounded-3xl border border-white/20 shadow-2xl flex flex-col items-center gap-4">
            <svg class="animate-spin h-10 w-10 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-white font-bold tracking-widest text-xs uppercase">Processing...</span>
        </div>
    </div>
    <nav class="border-b border-white/10 sticky top-0 z-50 bg-black/80 backdrop-blur-md">
        <div class="container mx-auto px-4 sm:px-6 h-auto sm:h-20 flex flex-col sm:flex-row justify-center sm:justify-between items-stretch sm:items-center">
            
            <!-- Logo & Lang Switcher Row (Mobile) -->
            <div class="flex items-center justify-between py-3 sm:py-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 sm:w-12 sm:h-12 rounded flex items-center justify-center overflow-hidden">
                        <img src="/open_tdm.jpeg" alt="Logo" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col">
                        <span class="text-base sm:text-xl font-extrabold uppercase tracking-widest text-white leading-tight">Open TDM</span>
                        <span class="text-[8px] sm:text-xs text-gray-400 font-bold uppercase tracking-widest">Global Rankings</span>
                    </div>
                </div>
                
                <!-- Language switcher (Mobile Right) -->
                <div class="flex sm:hidden shrink-0 items-center gap-1 bg-white/5 rounded-full border border-white/10 p-1">
                    <a href="/lang/en" class="lang-btn px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-transparent text-gray-400 hover:text-white {{if eq .Lang "en"}}active{{end}}">EN</a>
                    <a href="/lang/es" class="lang-btn px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-transparent text-gray-400 hover:text-white {{if eq .Lang "es"}}active{{end}}">ES</a>
                </div>
            </div>

            <!-- Main Nav & Desktop Lang Switcher -->
            <div class="flex items-center justify-start sm:justify-end gap-6 pb-3 sm:pb-0 overflow-x-auto hide-scrollbar w-full sm:w-auto snap-x">
                <div class="flex flex-nowrap gap-5 sm:gap-6 font-bold text-[11px] sm:text-sm tracking-widest uppercase text-gray-400 min-w-max px-1">
                    <a href="/rankings/singles" class="snap-start shrink-0 hover:text-white transition-colors pb-1 {{if eq .Type "Singles"}}text-white border-b-2 border-white{{end}}">
                        {{t .T "nav.singles"}}
                    </a>
                    <a href="/rankings/doubles" class="snap-start shrink-0 hover:text-white transition-colors pb-1 {{if eq .Type "Doubles"}}text-white border-b-2 border-white{{end}}">
                        {{t .T "nav.doubles"}}
                    </a>
                    <a href="/tournaments" class="snap-start shrink-0 hover:text-white transition-colors pb-1 {{if eq .Type "Tournaments"}}text-white border-b-2 border-white{{end}}">
                        {{t .T "nav.tournaments"}}
                    </a>
                    <a href="/tournaments/register" class="snap-start shrink-0 hover:text-white transition-colors pb-1 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                        {{t .T "nav.register"}}
                    </a>
                </div>

                <!-- Language switcher (Desktop) -->
                <div class="hidden sm:flex shrink-0 items-center gap-1 bg-white/5 rounded-full border border-white/10 p-1">
                    <a href="/lang/en" class="lang-btn px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-transparent text-gray-400 hover:text-white {{if eq .Lang "en"}}active{{end}}">EN</a>
                    <a href="/lang/es" class="lang-btn px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-transparent text-gray-400 hover:text-white {{if eq .Lang "es"}}active{{end}}">ES</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-grow container mx-auto px-6 py-12">
        {{embed}}
    </main>
    <footer class="border-t border-white/10 py-8 text-center text-gray-600 text-xs font-bold tracking-widest uppercase mt-12 bg-black/40">
        {{t .T "footer.copy"}}
    </footer>
</body>
</html>
