<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Table Tennis Club</title>
    <meta name="description" content="Official Table Tennis Club rankings, athlete registration, and tournament management.">
    <script src="https://unpkg.com/htmx.org@1.9.3"></script>
    <script src="https://unpkg.com/htmx.org@1.9.3/dist/ext/ws.js"></script>
    <link href="/static/dist/tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #fff; counter-reset: rank; }
        .glass { background: rgba(18, 18, 18, 0.80); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.07); }
        .ranking-row:hover { background-color: rgba(255,255,255,0.04); transform: translateX(4px); transition: all 0.3s ease; box-shadow: -4px 0 0 rgba(255,255,255,0.6); }
        .rank-number::before { counter-increment: rank; content: counter(rank); }

        /* Language switcher */
        .lang-btn { transition: all 0.2s ease; }
        .lang-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.6); color: #fff; }

        /* Hide admin elements on public views */
        .proj-hide { display: none !important; }
        
        /* Hide scrollbar for nav */
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased text-gray-200">
    <nav class="border-b border-white/10 sticky top-0 z-50 bg-black/80 backdrop-blur-md">
        <div class="container mx-auto px-4 sm:px-6 py-4 sm:py-0 h-auto sm:h-20 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-8 sm:w-12 sm:h-10 bg-white rounded flex items-center justify-center font-bold text-black text-[10px] sm:text-xs tracking-tighter">CLUB</div>
                <div class="flex flex-col">
                    <span class="text-lg sm:text-xl font-extrabold uppercase tracking-widest text-white leading-tight">Table Tennis Club</span>
                    <span class="text-[9px] sm:text-xs text-gray-400 font-bold uppercase tracking-widest">Global Rankings</span>
                </div>
            </div>
            <div class="flex flex-wrap sm:flex-nowrap items-center justify-center sm:justify-end gap-4 sm:gap-6 w-full sm:w-auto mt-2 sm:mt-0 pb-2 sm:pb-0 overflow-x-auto hide-scrollbar">
                <!-- Main nav -->
                <div class="flex flex-nowrap gap-4 sm:gap-6 font-bold text-[11px] sm:text-sm tracking-widest uppercase text-gray-400 min-w-max">
                    <a href="/rankings/singles" class="shrink-0 hover:text-white transition-colors pb-1 {{if eq .Type "Singles"}}text-white border-b-2 border-white{{end}}">
                        {{index .T "nav.singles"}}
                    </a>
                    <a href="/rankings/doubles" class="shrink-0 hover:text-white transition-colors pb-1 {{if eq .Type "Doubles"}}text-white border-b-2 border-white{{end}}">
                        {{index .T "nav.doubles"}}
                    </a>
                    <a href="/tournaments" class="shrink-0 hover:text-white transition-colors pb-1 {{if eq .Type "Tournaments"}}text-white border-b-2 border-white{{end}}">
                        {{index .T "nav.tournaments"}}
                    </a>
                    <a href="/tournaments/register" class="shrink-0 hover:text-white transition-colors pb-1 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                        {{index .T "nav.register"}}
                    </a>
                </div>

                <!-- Language switcher -->
                <div class="flex shrink-0 items-center gap-1 bg-white/5 rounded-full border border-white/10 p-1">
                    <a href="/lang/en"
                       class="lang-btn px-2 sm:px-3 py-1 rounded-full text-[9px] sm:text-[10px] font-black uppercase tracking-widest border border-transparent text-gray-400 hover:text-white {{if eq .Lang "en"}}active{{end}}"
                       title="English">
                        EN
                    </a>
                    <a href="/lang/es"
                       class="lang-btn px-2 sm:px-3 py-1 rounded-full text-[9px] sm:text-[10px] font-black uppercase tracking-widest border border-transparent text-gray-400 hover:text-white {{if eq .Lang "es"}}active{{end}}"
                       title="Español">
                        ES
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-grow container mx-auto px-6 py-12">
        {{embed}}
    </main>
    <footer class="border-t border-white/10 py-8 text-center text-gray-600 text-xs font-bold tracking-widest uppercase mt-12 bg-black/40">
        {{index .T "footer.copy"}}
    </footer>
</body>
</html>
