<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Club Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        club: {
                            red: '#ffffff',
                            dark: '#0a0a0a',
                            panel: '#111111',
                            gold: '#e0e0e0'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #fff; counter-reset: rank; }
        .glass { background: rgba(18, 18, 18, 0.80); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.07); }
        .ranking-row:hover { background-color: rgba(255,255,255,0.04); transform: translateX(4px); transition: all 0.3s ease; box-shadow: -4px 0 0 rgba(255,255,255,0.6); }
        .rank-number::before { counter-increment: rank; content: counter(rank); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased text-gray-200">
    <nav class="border-b border-white/10 sticky top-0 z-50 bg-black/80 backdrop-blur-md">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-10 bg-white rounded flex items-center justify-center font-bold text-black text-xs tracking-tighter">CLUB</div>
                <div class="flex flex-col">
                    <span class="text-xl font-extrabold uppercase tracking-widest text-white leading-tight">Table Tennis Club</span>
                    <span class="text-xs text-gray-400 font-bold uppercase tracking-widest">Global Rankings</span>
                </div>
            </div>
            <div class="flex gap-6 font-bold text-sm tracking-widest uppercase text-gray-400">
                <a href="/rankings/singles" class="hover:text-white transition-colors pb-1 {{if eq .Type "Singles"}}text-white border-b-2 border-white{{end}}">Singles</a>
                <a href="/rankings/doubles" class="hover:text-white transition-colors pb-1 {{if eq .Type "Doubles"}}text-white border-b-2 border-white{{end}}">Doubles</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow container mx-auto px-6 py-12">
        {{embed}}
    </main>
    <footer class="border-t border-white/10 py-8 text-center text-gray-600 text-xs font-bold tracking-widest uppercase mt-12 bg-black/40">
        &copy; 2026 Club Rankings System
    </footer>
</body>
</html>
