<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WTT World Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        wtt: {
                            red: '#E60000',
                            dark: '#0e1111',
                            panel: '#1a1d1d',
                            gold: '#d4af37'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0e1111; color: #fff; counter-reset: rank; }
        .glass { background: rgba(26, 29, 29, 0.75); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .ranking-row:hover { background-color: rgba(255,255,255,0.04); transform: translateX(4px); transition: all 0.3s ease; box-shadow: -4px 0 0 #E60000; }
        .rank-number::before { counter-increment: rank; content: counter(rank); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased text-gray-200">
    <nav class="border-b border-white/10 sticky top-0 z-50 bg-black/80 backdrop-blur-md">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-wtt-red rounded flex items-center justify-center font-bold text-white text-lg tracking-tighter shadow-[0_0_15px_rgba(230,0,0,0.5)]">WTT</div>
                <div class="flex flex-col">
                    <span class="text-xl font-extrabold uppercase tracking-widest text-white leading-tight">World Table Tennis</span>
                    <span class="text-xs text-wtt-gold font-bold uppercase tracking-widest">Global Rankings</span>
                </div>
            </div>
            <div class="flex gap-6 font-bold text-sm tracking-widest uppercase text-gray-400">
                <a href="/rankings/singles" class="hover:text-wtt-gold transition-colors pb-1 {{if eq .Type "Singles"}}text-wtt-gold border-b-2 border-wtt-gold{{end}}">Singles</a>
                <a href="/rankings/doubles" class="hover:text-wtt-gold transition-colors pb-1 {{if eq .Type "Doubles"}}text-wtt-gold border-b-2 border-wtt-gold{{end}}">Doubles</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow container mx-auto px-6 py-12">
        {{embed}}
    </main>
    <footer class="border-t border-wtt-red/20 py-8 text-center text-gray-600 text-xs font-bold tracking-widest uppercase mt-12 bg-black/40">
        &copy; 2026 World Table Tennis Rankings System
    </footer>
</body>
</html>
