<!DOCTYPE html>
<html lang="{{if .Lang}}{{.Lang}}{{else}}en{{end}}">
<head>
    <meta charset="UTF-8">
    <title>Club Admin Portal</title>
    <script src="https://unpkg.com/htmx.org@1.9.3"></script>
    <script src="https://unpkg.com/htmx.org@1.9.3/dist/ext/ws.js"></script>
    <link href="/static/dist/tailwind.css?v=3" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* ── Base (Admin / Dark) Theme ───────────────────────────── */
        body { background-color: #0a0a0a; color: #fff; transition: background .25s, color .25s; }
        .glass { background: rgba(18,18,18,.80); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.07); }

        /* ── Projector Theme ─────────────────────────────────────── */
        body.proj { background-color: #ffffff !important; color: #000 !important; }
        body.proj .glass {
            background: #f5f5f5 !important;
            backdrop-filter: none !important;
            border: 2px solid #ccc !important;
        }
        /* Nav stays dark so the logo stays readable */
        body.proj nav { background: #111 !important; border-bottom: 3px solid #333 !important; }
        body.proj nav, body.proj nav * { color: #ffffff !important; }

        /* Hide admin-only controls */
        body.proj .proj-hide { display: none !important; }

        /* ---- Typography ---- */
        body.proj .text-white,
        body.proj .text-white\/90 { color: #111 !important; }
        body.proj .text-gray-400,
        body.proj .text-gray-500,
        body.proj .text-gray-600 { color: #555 !important; }
        body.proj .opacity-40 { opacity: .65 !important; }
        body.proj .opacity-60 { opacity: .75 !important; }

        /* ---- Borders & Backgrounds ---- */
        body.proj .border-white\/10,
        body.proj .border-white\/5 { border-color: #ccc !important; }
        body.proj .bg-black\/20,
        body.proj .bg-black\/40 { background: #f5f5f5 !important; }
        body.proj .bg-white\/5,
        body.proj .bg-white\/\[0\.03\] { background: #fafafa !important; }
        body.proj .divide-y > * { border-color: #ddd !important; }

        /* ---- Match cards ---- */
        body.proj .proj-match-card {
            border: 3px solid #222 !important;
            border-radius: 14px !important;
            background: #fff !important;
        }
        /* Player slot rows inside match cards */
        body.proj .proj-player-slot {
            border: 2px solid #bbb !important;
            border-radius: 10px !important;
            background: #f8f8f8 !important;
            padding: 10px 14px !important;
        }
        body.proj .proj-player-slot.proj-winner-slot {
            background: #f0fdf4 !important;
            border-color: #16a34a !important;
        }
        /* Name text */
        body.proj .proj-player-name {
            font-size: 1.25rem !important;
            font-weight: 900 !important;
            color: #000 !important;
            letter-spacing: -.01em !important;
        }
        /* Score digit */
        body.proj .proj-score {
            font-size: 2.5rem !important;
            font-weight: 900 !important;
            line-height: 1 !important;
            color: #000 !important;
            min-width: 2ch !important;
            text-align: right !important;
        }
        body.proj .proj-score.proj-winner-score { color: #15803d !important; }
        /* Elo is noise on projector */
        body.proj .proj-elo { display: none !important; }

        /* ---- Standings table ---- */
        body.proj .proj-table th {
            font-size: .95rem !important;
            background: #eee !important;
            color: #333 !important;
            padding: 14px 18px !important;
        }
        body.proj .proj-table td {
            font-size: 1.2rem !important;
            font-weight: 700 !important;
            color: #000 !important;
            padding: 12px 18px !important;
        }
        body.proj .proj-table tbody tr:nth-child(odd) { background: #fafafa !important; }

        /* ---- Section / round labels ---- */
        body.proj .proj-section-title {
            font-size: 1.5rem !important;
            font-weight: 900 !important;
            color: #000 !important;
        }
        body.proj .proj-round-label {
            font-size: 1rem !important;
            font-weight: 900 !important;
            color: #333 !important;
        }

        /* ---- Winner chip ---- */
        body.proj .text-green-400 { color: #15803d !important; }
        body.proj .bg-green-400\/10 { background: #dcfce7 !important; }
        body.proj .border-green-400\/20 { border-color: #86efac !important; }

        /* ---- Bracket box wider for big text ---- */
        body.proj .bracket-match { width: 17rem !important; }

        /* ---- Group cards ---- */
        body.proj [class*="group-card"],
        body.proj [class*="bg-black"] { background: #fff !important; }

        /* ── Custom HTMX Transitions & CSS Helpers ── */
        @keyframes toast-lifecycle {
            0% { transform: translateX(100%); opacity: 0; }
            8% { transform: translateX(0); opacity: 1; }
            92% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; display: none; }
        }
        .toast-slide-in {
            animation: toast-lifecycle 4.5s forwards ease-in-out;
        }
        body:has(.event-checkbox:checked) #bulk-delete-btn {
            display: inline-flex !important;
        }
        body:has(#match-type-selector option[value="doubles"]:checked) #teamA-player2,
        body:has(#match-type-selector option[value="doubles"]:checked) #teamB-player2 {
            display: block !important;
        }
        
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="glass border-b border-white/10 sticky top-0 z-50">
        <div class="container mx-auto px-4 sm:px-6 h-auto sm:h-16 py-3 sm:py-0 flex flex-col sm:flex-row items-center justify-between gap-3 sm:gap-0">
            <div class="flex items-center gap-2">
                <div class="w-12 h-8 bg-white rounded flex items-center justify-center font-bold text-black tracking-tighter text-xs">CLUB</div>
                <span class="text-xl font-extrabold uppercase tracking-widest text-white/90">Admin</span>
            </div>
            <div class="flex gap-4 sm:gap-6 font-semibold text-xs sm:text-sm tracking-wider uppercase text-gray-400 items-center overflow-x-auto w-full sm:w-auto pb-2 sm:pb-0 hide-scrollbar justify-start sm:justify-end shrink-0">
                <a href="/admin" class="hover:text-white transition-colors proj-hide">{{index .T "nav.dashboard"}}</a>
                <a href="/admin/players" class="hover:text-white transition-colors proj-hide">{{index .T "nav.players"}}</a>
                <a href="/admin/events" class="hover:text-white transition-colors proj-hide">{{index .T "nav.events"}}</a>
                <a href="/admin/tournaments" class="hover:text-white transition-colors proj-hide">{{index .T "nav.tournaments"}}</a>
                <a href="/admin/divisions" class="hover:text-white transition-colors proj-hide">{{index .T "nav.divisions"}}</a>
                <span class="w-px h-6 bg-white/20 mx-2 proj-hide"></span>
                <a href="/rankings/singles" class="hover:text-white transition-colors text-gray-300 proj-hide" target="_blank">{{index .T "nav.public_rankings"}}</a>
                <form method="POST" action="/admin/logout" class="ml-2 proj-hide">
                    <button type="submit" class="hover:text-white transition-colors uppercase tracking-wider font-semibold text-gray-400 text-sm">{{index .T "nav.logout"}}</button>
                </form>

                <!-- ── Language Switcher ── -->
                <div class="flex items-center bg-black/40 rounded-full p-1 proj-hide border border-white/10">
                    <a href="/lang/en"
                       class="px-2 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-transparent transition-all {{if eq .Lang "en"}}bg-white/15 text-white border-white/60{{else}}text-gray-400 hover:text-white{{end}}">
                        EN
                    </a>
                    <a href="/lang/es"
                       class="px-2 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-transparent transition-all {{if eq .Lang "es"}}bg-white/15 text-white border-white/60{{else}}text-gray-400 hover:text-white{{end}}">
                        ES
                    </a>
                </div>

                <!-- ── Theme Switcher ── -->
                <button id="theme-toggle"
                    onclick="toggleTheme()"
                    class="ml-4 flex items-center gap-2 px-4 py-1.5 rounded-full border border-white/20 text-white/80 hover:text-white hover:border-white/60 text-[11px] font-bold uppercase tracking-widest transition-all select-none"
                    title="Toggle Projector Mode">
                    <!-- Projector icon (shown when in projector mode) -->
                    <svg id="theme-icon-proj" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <!-- Moon icon (shown in dark/admin mode) -->
                    <svg id="theme-icon-dark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                    <span id="theme-label">{{index .T "nav.projector"}}</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-10">
        {{embed}}
    </main>

    <script>
        // ── Theme Switcher ────────────────────────────────────────────────────
        const THEME_KEY = 'club-theme';

        function applyTheme(theme) {
            const isProj = (theme === 'proj');
            document.body.classList.toggle('proj', isProj);
            document.getElementById('theme-label').textContent   = isProj ? '← Admin Mode' : 'Projector';
            document.getElementById('theme-icon-proj').classList.toggle('hidden', !isProj);
            document.getElementById('theme-icon-dark').classList.toggle('hidden',  isProj);
        }

        function toggleTheme() {
            const next = document.body.classList.contains('proj') ? 'dark' : 'proj';
            localStorage.setItem(THEME_KEY, next);
            applyTheme(next);
        }

        // Restore saved preference immediately (before first paint)
        applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
    </script>
    <script>
        // Synchronise search/filter checked state for player selection cards
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('participant-checkbox')) {
                const grid = e.target.closest('#player-selection-grid, #edit-player-selection-grid');
                if (!grid) return;

                const isEdit = grid.id === 'edit-player-selection-grid';
                const containerId = isEdit ? 'edit-selected-participants-hidden' : 'selected-participants-hidden';
                const container = document.getElementById(containerId);
                if (!container) return;

                const val = e.target.value;
                const existing = container.querySelector(`input[value="${val}"]`);

                if (e.target.checked) {
                    if (!existing) {
                        const hidden = document.createElement('input');
                        hidden.type = 'hidden';
                        hidden.name = 'participant_ids[]';
                        hidden.value = val;
                        container.appendChild(hidden);
                    }
                } else {
                    if (existing) {
                        existing.remove();
                    }
                }
            }
        });

        document.addEventListener('htmx:afterSwap', function(e) {
            const target = e.target;
            if (target && (target.id === 'player-selection-grid' || target.id === 'edit-player-selection-grid')) {
                const isEdit = target.id === 'edit-player-selection-grid';
                const containerId = isEdit ? 'edit-selected-participants-hidden' : 'selected-participants-hidden';
                const container = document.getElementById(containerId);
                if (!container) return;

                const checkboxes = target.querySelectorAll('.participant-checkbox');
                checkboxes.forEach(cb => {
                    const val = cb.value;
                    const existing = container.querySelector(`input[value="${val}"]`);
                    if (cb.checked) {
                        if (!existing) {
                            const hidden = document.createElement('input');
                            hidden.type = 'hidden';
                            hidden.name = 'participant_ids[]';
                            hidden.value = val;
                            container.appendChild(hidden);
                        }
                    } else {
                        if (existing) {
                            existing.remove();
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
