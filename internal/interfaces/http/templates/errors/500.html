<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error | Open TDM Nicaragua</title>
    <link href="/static/dist/tailwind.css?v=3" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="text-center space-y-6 px-6">
        <div class="relative">
            <span class="text-[10rem] sm:text-[14rem] font-black leading-none text-white/5 select-none">500</span>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <svg class="w-16 h-16 text-red-400/60 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <h1 class="text-3xl sm:text-5xl font-black uppercase tracking-tight">Something Went Wrong</h1>
            </div>
        </div>
        <p class="text-gray-500 text-lg max-w-md mx-auto">
            An unexpected error occurred on our end. Please try again in a moment.
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center pt-4">
            <a href="/" class="bg-white hover:bg-gray-200 text-black font-bold py-3 px-8 rounded-full transition-all uppercase tracking-wider text-sm">
                Go Home
            </a>
            <button onclick="window.history.back()" class="bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-8 rounded-full transition-all uppercase tracking-wider text-sm border border-white/10">
                Go Back
            </button>
        </div>
        <p class="text-gray-700 text-xs font-mono pt-2">Error reference: {{if .Message}}{{.Message}}{{end}}</p>
    </div>
</body>
</html>
