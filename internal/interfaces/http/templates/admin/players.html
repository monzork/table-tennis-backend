<div class="space-y-8 animate-fade-in text-white/90">
    <header class="flex justify-between items-center">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tight uppercase">Players <span class="text-wtt-red">.</span></h1>
            <p class="text-gray-400 mt-1">Global Athlete Database</p>
        </div>
        <button onclick="document.getElementById('add-player-modal').classList.remove('hidden')" class="bg-wtt-red hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full transition-all uppercase tracking-wider text-sm">Add Player</button>
    </header>

    <div class="glass rounded-2xl overflow-hidden border border-white/10">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-black/40 border-b border-white/10">
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Name</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Nationality</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Gender</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Singles Elo</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Doubles Elo</th>
                </tr>
            </thead>
            <tbody id="player-list" class="divide-y divide-white/10">
                {{range .Players}}
                    {{template "admin/partials/player-row" .}}
                {{end}}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Modal -->
<div id="add-player-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100]">
    <div class="bg-wtt-panel border border-white/10 p-8 rounded-2xl max-w-md w-full relative">
        <button onclick="document.getElementById('add-player-modal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-white">&times;</button>
        <h2 class="text-2xl font-bold uppercase mb-6 tracking-wide">New Athlete</h2>
        <form hx-post="/players" hx-target="#player-list" hx-swap="beforeend" class="space-y-4" onsubmit="setTimeout(() => document.getElementById('add-player-modal').classList.add('hidden'), 50)">
            <div class="flex gap-4">
                <input type="text" name="firstName" placeholder="First Name" required class="flex-1 bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors">
                <input type="text" name="lastName" placeholder="Last Name" required class="flex-1 bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors">
            </div>
            <div class="flex gap-4">
                <input type="date" name="birthdate" required class="flex-1 bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors [color-scheme:dark]">
                <select name="gender" class="flex-1 bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors appearance-none">
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>
            <input type="text" name="country" placeholder="Country Code (e.g. CHN)" required class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors">
            <button type="submit" class="w-full bg-wtt-red hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all uppercase tracking-wider mt-4">Register</button>
        </form>
    </div>
</div>
