<div class="space-y-8 animate-fade-in text-white/90">
    <header class="flex justify-between items-center">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tight uppercase">Matches <span class="text-wtt-red">.</span></h1>
            <p class="text-gray-400 mt-1">Score Updates & Elo Ratings</p>
        </div>
        <button onclick="document.getElementById('add-match-modal').classList.remove('hidden')" class="bg-wtt-red hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full transition-all uppercase tracking-wider text-sm">Add Match</button>
    </header>

    <div class="glass rounded-2xl overflow-hidden border border-white/10">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-black/40 border-b border-white/10">
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Tournament</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Type</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Team A</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Team B</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Status</th>
                    <th class="p-4 font-semibold text-gray-400 uppercase text-xs tracking-wider">Action</th>
                </tr>
            </thead>
            <tbody id="match-list" class="divide-y divide-white/10">
                {{range .Matches}}
                    {{template "admin/partials/match-row" .}}
                {{end}}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Modal -->
<div id="add-match-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100]">
    <div class="bg-wtt-panel border border-white/10 p-8 rounded-2xl max-w-lg w-full relative">
        <button onclick="document.getElementById('add-match-modal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-white">&times;</button>
        <h2 class="text-2xl font-bold uppercase mb-6 tracking-wide">New Match</h2>
        <form hx-post="/matches/create" hx-target="#match-list" hx-swap="afterbegin" class="space-y-4" onsubmit="setTimeout(() => document.getElementById('add-match-modal').classList.add('hidden'), 50)">
            <input type="text" name="tournamentId" placeholder="Tournament ID (UUID)" required class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors">
            
            <select name="matchType" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors appearance-none" required onchange="document.getElementById('doubles-fields').classList.toggle('hidden', this.value !== 'doubles')">
                <option value="singles" selected>Singles</option>
                <option value="doubles">Doubles</option>
            </select>

            <!-- Team A -->
            <div class="bg-black/30 p-4 rounded-lg border border-white/5 space-y-3">
                <h3 class="text-xs uppercase text-wtt-red font-bold tracking-widest">Team A</h3>
                <select name="teamAPlayerIds" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors appearance-none" required>
                    <option value="" disabled selected>Select Player 1</option>
                    {{range $.Players}}
                        <option value="{{.ID}}">{{.FirstName}} {{.LastName}} ({{.Country}})</option>
                    {{end}}
                </select>
                <div id="doubles-fields" class="hidden">
                    <select name="teamAPlayerIds" class="w-full mt-3 bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors appearance-none">
                        <option value="">Select Player 2 (Optional for Singles)</option>
                        {{range $.Players}}
                            <option value="{{.ID}}">{{.FirstName}} {{.LastName}} ({{.Country}})</option>
                        {{end}}
                    </select>
                </div>
            </div>

            <!-- Team B -->
            <div class="bg-black/30 p-4 rounded-lg border border-white/5 space-y-3">
                <h3 class="text-xs uppercase text-wtt-gold font-bold tracking-widest">Team B</h3>
                <select name="teamBPlayerIds" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors appearance-none" required>
                    <option value="" disabled selected>Select Player 1</option>
                    {{range $.Players}}
                        <option value="{{.ID}}">{{.FirstName}} {{.LastName}} ({{.Country}})</option>
                    {{end}}
                </select>
                <div id="doubles-fields-b" class="hidden">
                    <select name="teamBPlayerIds" class="w-full mt-3 bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-wtt-red transition-colors appearance-none">
                        <option value="">Select Player 2 (Optional for Singles)</option>
                        {{range $.Players}}
                            <option value="{{.ID}}">{{.FirstName}} {{.LastName}} ({{.Country}})</option>
                        {{end}}
                    </select>
                </div>
            </div>

            <script>
                document.querySelector('select[name="matchType"]').addEventListener('change', function(e) {
                    const isDoubles = e.target.value === 'doubles';
                    document.getElementById('doubles-fields').classList.toggle('hidden', !isDoubles);
                    document.getElementById('doubles-fields-b').classList.toggle('hidden', !isDoubles);
                    // Make player 2 required if doubles
                    const p2a = document.querySelector('#doubles-fields select');
                    const p2b = document.querySelector('#doubles-fields-b select');
                    if(isDoubles) { p2a.setAttribute('required', 'true'); p2b.setAttribute('required', 'true'); }
                    else { p2a.removeAttribute('required'); p2b.removeAttribute('required'); }
                });
            </script>

            <button type="submit" class="w-full bg-wtt-red hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all uppercase tracking-wider mt-4">Create Match</button>
        </form>
    </div>
</div>
