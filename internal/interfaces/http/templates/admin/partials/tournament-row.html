{{define "admin/partials/tournament-row"}}
<tr class="hover:bg-white/5 transition-colors group" id="tournament-{{.ID}}">
    <td class="p-4">
        <div class="flex flex-col">
            <span class="font-bold uppercase text-white tracking-widest">{{.Name}}</span>
            {{if .RegistrationOpen}}
            <span class="text-[8px] font-black uppercase tracking-tighter text-green-500 bg-green-500/10 px-1.5 py-0.5 rounded w-fit mt-1 border border-green-500/20">Registration Open</span>
            {{else}}
            <span class="text-[8px] font-black uppercase tracking-tighter text-gray-500 bg-white/5 px-1.5 py-0.5 rounded w-fit mt-1 border border-white/5">Registration Closed</span>
            {{end}}
        </div>
    </td>
    <td class="p-4 text-gray-400 capitalize tracking-widest text-xs">{{.Type}} / {{.Format}}</td>
    <td class="p-4 text-gray-400 font-mono text-xs">{{.StartDate.Format "Jan 02, 2006"}}</td>
    <td class="p-4 text-gray-400 font-mono text-xs">{{.EndDate.Format "Jan 02, 2006"}}</td>
    <td class="p-4">
        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <a href="/admin/tournaments/{{.ID}}" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white border border-white/10 hover:border-white/30 px-3 py-1.5 rounded-lg transition-all">
                View
            </a>
            <button 
                hx-delete="/tournaments/{{.ID}}" 
                hx-confirm="Delete this tournament and all its data?"
                hx-target="closest tr" 
                hx-swap="outerHTML swap:0.5s"
                class="text-[10px] font-bold uppercase tracking-widest text-red-500 hover:text-white hover:bg-red-700 border border-red-900/50 hover:border-red-700 px-3 py-1.5 rounded-lg transition-all">
                Delete
            </button>
        </div>
    </td>
</tr>
{{end}}
