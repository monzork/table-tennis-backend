<h2 class="text-2xl font-extrabold uppercase mb-8 tracking-tighter">Edit <span class="text-white">Athlete</span>.</h2>

<form hx-put="/players/{{.ID}}" hx-target="#player-{{.ID}}" hx-swap="outerHTML" class="space-y-4" hx-on::after-request="if(event.detail.successful) document.getElementById('edit-player-modal').classList.add('hidden')">
    <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">First Name</label>
            <input type="text" name="firstName" value="{{.FirstName}}" required class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white">
        </div>
        <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">Last Name</label>
            <input type="text" name="lastName" value="{{.LastName}}" required class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white">
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">Birthdate</label>
            <input type="date" name="birthdate" value="{{.Birthdate.Format "2006-01-02"}}" required class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white [color-scheme:dark]">
        </div>
        <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">Gender</label>
            <select name="gender" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white">
                <option value="M" {{if eq .Gender "M"}}selected{{end}}>Male</option>
                <option value="F" {{if eq .Gender "F"}}selected{{end}}>Female</option>
            </select>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-4">
        <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">Nationality (ISO)</label>
            <input type="text" name="country" value="{{.Country}}" required maxlength="3" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white uppercase">
        </div>
        <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">WhatsApp Number</label>
            <input type="text" name="whatsAppNumber" value="{{.WhatsAppNumber}}" placeholder="+52..." class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white">
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 pt-2 border-t border-white/5 mt-4">
        <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">Singles Elo</label>
            <input type="number" name="singlesElo" value="{{.SinglesElo}}" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white">
        </div>
        <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">Doubles Elo</label>
            <input type="number" name="doublesElo" value="{{.DoublesElo}}" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white">
        </div>
    </div>

    <div class="flex gap-3 pt-6">
        <button type="button" hx-on:click="document.getElementById('edit-player-modal').classList.add('hidden')" class="flex-1 border border-white/10 hover:border-white/20 text-gray-400 font-bold py-4 rounded-2xl transition-all uppercase tracking-widest text-xs">Cancel</button>
        <button type="submit" class="flex-2 bg-white hover:bg-gray-200 text-black font-extrabold py-4 px-8 rounded-2xl transition-all uppercase tracking-widest text-xs shadow-lg">Save Athlete</button>
    </div>
</form>
