<label class="text-xs font-bold uppercase text-gray-400 tracking-widest">Division (Elo restrictions)</label>
<select name="divisionId" id="divisionIdSelect" class="w-full bg-black/40 border border-white/5 rounded-xl p-4 text-white focus:outline-none focus:ring-1 focus:ring-white transition-all appearance-none" required>
    {{range .Divisions}}
    <option value="{{.ID}}">{{.Name}} ({{.MinElo}}{{if .MaxElo}} - {{.MaxElo}}{{else}}+{{end}} Elo)</option>
    {{end}}
</select>
