{{define "admin/partials/player-row"}}
<tr class="hover:bg-white/5 transition-colors group flex flex-col sm:table-row border-b border-white/10 sm:border-b-0 p-4 sm:p-0 relative" id="player-{{.ID}}">
    <td class="block sm:table-cell p-0 sm:p-4 font-semibold text-xl sm:text-base mb-2 sm:mb-0">{{.FirstNameWithSecond}} <span class="uppercase font-bold">{{.LastNameWithSecond}}</span></td>
    <td class="block sm:table-cell p-0 sm:p-4 text-gray-400 font-mono text-xs mb-1 sm:mb-0"><span class="sm:hidden font-bold uppercase text-[9px] text-gray-500 mr-2">National ID:</span>{{if .NationalID}}{{.NationalID}}{{else}}-{{end}}</td>
    <td class="block sm:table-cell p-0 sm:p-4 text-gray-400 mb-1 sm:mb-0"><span class="sm:hidden font-bold uppercase text-[9px] text-gray-500 mr-2">Nationality:</span>{{.Country}}</td>
    <td class="block sm:table-cell p-0 sm:p-4 text-gray-400 mb-1 sm:mb-0"><span class="sm:hidden font-bold uppercase text-[9px] text-gray-500 mr-2">Department:</span>{{.Department}}</td>
    <td class="block sm:table-cell p-0 sm:p-4 text-gray-400 mb-2 sm:mb-0"><span class="sm:hidden font-bold uppercase text-[9px] text-gray-500 mr-2">Gender:</span>{{.Gender}}</td>
    <td class="block sm:table-cell p-0 sm:p-4 text-white font-bold mb-1 sm:mb-0"><span class="sm:hidden font-bold uppercase text-[9px] text-gray-500 mr-2">Singles Elo:</span>{{.SinglesElo}}</td>
    <td class="block sm:table-cell p-0 sm:p-4 text-white font-bold mb-3 sm:mb-0"><span class="sm:hidden font-bold uppercase text-[9px] text-gray-500 mr-2">Doubles Elo:</span>{{.DoublesElo}}</td>
    <td class="block sm:table-cell p-0 sm:p-4">
        <div class="flex gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity justify-start sm:justify-end">
            <button 
                hx-get="/players/{{.ID}}/edit" 
                hx-target="#edit-modal-content"
                hx-on:click="document.getElementById('edit-player-modal').classList.remove('hidden')"
                class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white border border-white/10 hover:border-white/30 px-3 py-1.5 rounded-lg transition-all flex-1 sm:flex-none">
                Edit
            </button>
            <button 
                hx-delete="/players/{{.ID}}" 
                hx-confirm="Are you sure you want to delete this athlete?"
                hx-target="closest tr" 
                hx-swap="outerHTML swap:0.5s"
                class="text-[10px] font-bold uppercase tracking-widest text-red-500 hover:text-white hover:bg-red-700 border border-red-900/50 hover:border-red-700 px-3 py-1.5 rounded-lg transition-all flex-1 sm:flex-none">
                Delete
            </button>
        </div>
    </td>
</tr>
{{end}}
