{{define "admin/partials/player-row"}}
<tr class="hover:bg-white/5 transition-colors group" id="player-{{.ID}}">
    <td class="p-4 font-semibold">{{.FirstName}} <span class="uppercase font-bold">{{.LastName}}</span></td>
    <td class="p-4 text-gray-400">{{.Country}}</td>
    <td class="p-4 text-gray-400">{{.Gender}}</td>
    <td class="p-4 text-white font-bold">{{.SinglesElo}}</td>
    <td class="p-4 text-white font-bold">{{.DoublesElo}}</td>
    <td class="p-4">
        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <button 
                hx-get="/players/{{.ID}}/edit" 
                hx-target="#edit-modal-content"
                hx-on:click="document.getElementById('edit-player-modal').classList.remove('hidden')"
                class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white border border-white/10 hover:border-white/30 px-3 py-1.5 rounded-lg transition-all">
                Edit
            </button>
            <button 
                hx-delete="/players/{{.ID}}" 
                hx-confirm="Are you sure you want to delete this athlete?"
                hx-target="closest tr" 
                hx-swap="outerHTML swap:0.5s"
                class="text-[10px] font-bold uppercase tracking-widest text-red-500 hover:text-white hover:bg-red-700 border border-red-900/50 hover:border-red-700 px-3 py-1.5 rounded-lg transition-all">
                Delete
            </button>
        </div>
    </td>
</tr>
{{end}}
