{{define "admin/partials/event-row"}}
<tr class="hover:bg-white/5 transition-colors group" id="event-{{.ID}}">
    <td class="p-4 w-12">
        <input type="checkbox" name="ids" value="{{.ID}}" class="event-checkbox accent-white h-4 w-4 bg-black/40 border border-white/10 rounded cursor-pointer">
    </td>
    <td class="p-4">
        <div class="flex flex-col">
            <span class="font-bold uppercase text-white tracking-widest">{{.Name}}</span>
            <div class="flex gap-1.5 mt-1">
                {{if .SkipElo}}
                <span class="text-[8px] font-black uppercase tracking-tighter text-yellow-500 bg-yellow-500/10 px-1.5 py-0.5 rounded w-fit border border-yellow-500/20">Non-Rated (No Elo)</span>
                {{else}}
                <span class="text-[8px] font-black uppercase tracking-tighter text-blue-500 bg-blue-500/10 px-1.5 py-0.5 rounded w-fit border border-blue-500/20">Rated (Elo)</span>
                {{end}}
            </div>
        </div>
    </td>
    <td class="p-4 text-gray-400 capitalize tracking-widest text-xs">
        {{if .SkipElo}}
        <span class="px-2.5 py-1 rounded bg-white/5 border border-white/5 text-gray-500 font-bold">—</span>
        {{else}}
        <span class="px-2.5 py-1 rounded bg-white/5 border border-white/10 font-bold">{{.DivisionID}}</span>
        {{end}}
    </td>
    <td class="p-4 text-gray-400 capitalize tracking-widest text-xs font-bold">{{len .Tournaments}} Categories</td>
    <td class="p-4 text-gray-400 font-mono text-xs">{{.StartDate.Format "Jan 02, 2006"}}</td>
    <td class="p-4 text-gray-400 font-mono text-xs">{{.EndDate.Format "Jan 02, 2006"}}</td>
    <td class="p-4">
        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <a href="/admin/events/{{.ID}}" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white border border-white/10 hover:border-white/30 px-3 py-1.5 rounded-lg transition-all">
                Manage
            </a>
            <button 
                hx-delete="/events/{{.ID}}" 
                hx-confirm="Delete this parent event? Child tournaments will NOT be deleted, but they will be unlinked."
                hx-target="closest tr" 
                hx-swap="outerHTML swap:0.5s"
                class="text-[10px] font-bold uppercase tracking-widest text-red-500 hover:text-white hover:bg-red-700 border border-red-900/50 hover:border-red-700 px-3 py-1.5 rounded-lg transition-all">
                Delete
            </button>
        </div>
    </td>
</tr>
{{end}}
