{{define "admin/partials/tournament-edit-form"}}
<div id="tournament-edit-form">
  {{if .Success}}
  <div class="mb-4 flex items-center gap-2 px-4 py-3 rounded-xl bg-green-500/10 border border-green-500/20 text-green-400 text-xs font-bold uppercase tracking-widest animate-pulse">
    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    Tournament updated successfully
  </div>
  {{end}}
  <form hx-put="/tournaments/{{.Tournament.ID}}"
        hx-target="#tournament-edit-form"
        hx-swap="outerHTML"
        class="space-y-4">

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="sm:col-span-2">
        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Tournament Name</label>
        <input type="text" name="name" value="{{.Tournament.Name}}" required
               class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-white/30 transition-colors">
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Start Date</label>
        <input type="date" name="startDate" value="{{.Tournament.StartDate.Format "2006-01-02"}}"
               class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-white/30 transition-colors">
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">End Date</label>
        <input type="date" name="endDate" value="{{.Tournament.EndDate.Format "2006-01-02"}}"
               class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-white/30 transition-colors">
      </div>

      <div>
        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Number of Tables</label>
        <input type="number" name="numTables" value="{{.Tournament.NumTables}}" min="1" max="50"
               class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-white/30 transition-colors">
      </div>

      <div class="sm:col-span-2">
        <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 mt-2 border-b border-white/10 pb-1">Table Priorities per Division (Optional)</label>
        <div class="space-y-2">
          {{range .DivPriorities}}
          <div class="flex items-center justify-between">
            <span class="text-xs text-white/70">{{.Name}}</span>
            <input type="text" name="priority_{{.ID}}" value="{{.Priorities}}" placeholder="e.g. 1, 2"
                   class="w-1/2 bg-black/30 border border-white/10 rounded-xl px-3 py-1.5 text-sm text-white placeholder-gray-700 focus:outline-none focus:border-white/30 transition-colors">
          </div>
          {{end}}
        </div>
      </div>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="flex-1 bg-white hover:bg-gray-200 text-black text-xs font-black uppercase tracking-widest py-2.5 rounded-xl transition-all">
        Save Changes
      </button>
      <button type="button"
              onclick="document.getElementById('edit-tournament-modal').classList.add('hidden')"
              class="flex-1 bg-white/5 hover:bg-white/10 text-white text-xs font-bold uppercase tracking-widest py-2.5 rounded-xl border border-white/10 transition-all">
        Cancel
      </button>
    </div>
  </form>
</div>
{{end}}
