<div class="space-y-8 animate-fade-in text-white/90">
    <header class="flex justify-between items-center border-b border-white/10 pb-6">
        <div>
            <h1 class="text-4xl font-black tracking-tight uppercase italic"><span class="text-white">Manage</span> DIVISIONS</h1>
            <p class="text-gray-400 mt-2 tracking-wide font-light">Configure ranking divisions and ELO brackets.</p>
        </div>
        <button 
            hx-get="/divisions" 
            hx-target="#division-modal-content"
            onclick="document.getElementById('divisionModal').classList.remove('hidden')"
            class="bg-white hover:bg-gray-200 text-black font-bold py-3 px-6 rounded-lg transition-all uppercase tracking-widest text-sm flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Add Division
        </button>
    </header>

    <div class="glass rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-black/60 border-b border-white/10">
                    <th class="py-4 px-6 text-gray-400 font-bold uppercase text-xs tracking-widest">Order</th>
                    <th class="py-4 px-6 text-gray-400 font-bold uppercase text-xs tracking-widest">Division Name</th>
                    <th class="py-4 px-6 text-gray-400 font-bold uppercase text-xs tracking-widest">ELO Range</th>
                    <th class="py-4 px-6 text-gray-400 font-bold uppercase text-xs tracking-widest text-center">Color</th>
                    <th class="py-4 px-6 text-gray-400 font-bold uppercase text-xs tracking-widest text-right">Actions</th>
                </tr>
            </thead>
            <tbody id="division-list" class="divide-y divide-white/5">
                {{range .Divisions}}
                    {{template "admin/partials/division-row" .}}
                {{else}}
                    <tr><td colspan="5" class="py-12 text-center text-gray-500 italic font-light tracking-wider">No divisions configured. Add one to get started.</td></tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Division Modal -->
<div id="divisionModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-50 flex justify-center items-center overflow-y-auto pt-10 pb-10 transition-all duration-300">
    <div class="glass w-full max-w-lg rounded-3xl border border-white/10 shadow-2xl relative" id="division-modal-content">
        <!-- Content loaded via HTMX -->
        <div class="flex justify-center p-20">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-white"></div>
        </div>
    </div>
</div>

<script>
    // Minimal JS for simple UI state if needed, but HTMX handles the rest
</script>
