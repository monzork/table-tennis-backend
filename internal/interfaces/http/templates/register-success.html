<div class="max-w-xl mx-auto animate-fade-in">
    <div class="glass p-12 rounded-3xl shadow-2xl text-center border-white/20">
        <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce-slow shadow-xl">
            <svg class="w-10 h-10 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h1 class="text-4xl font-extrabold uppercase tracking-tighter mb-4">{{.Title}}</h1>
        <p class="text-gray-400 text-lg mb-10">{{.Message}}</p>

        <a href="/rankings/singles" class="inline-block bg-white hover:bg-gray-200 text-black font-black py-4 px-10 rounded-2xl transition-all uppercase tracking-widest text-sm transform hover:-translate-y-1 active:scale-95 shadow-lg">
            View Rankings
        </a>
    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceSlow {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    .animate-fade-in {
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-bounce-slow {
        animation: bounceSlow 3s infinite ease-in-out;
    }
</style>
