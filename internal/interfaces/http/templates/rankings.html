<div class="space-y-10 animate-fade-in text-white/90 max-w-5xl mx-auto">
    <header class="text-center space-y-4">
        <h1 class="text-6xl font-black tracking-tight uppercase italic"><span class="text-white">{{.Type}}</span> Rankings</h1>
        <p class="text-xl text-gray-400 font-light tracking-wide">Official world rankings by category.</p>
    </header>

    <!-- Gender / Format Navigation Tabs -->
    <div class="flex flex-wrap justify-center gap-2">
        <a href="/rankings/mens/singles" class="tab-btn px-5 py-2 rounded-full border text-sm font-bold tracking-widest uppercase transition-all duration-200 {{if eq .ActiveTab "M-singles"}}bg-white text-black border-white{{else}}bg-transparent text-gray-400 border-white/20 hover:border-white/50 hover:text-white{{end}}">♂ Men's Singles</a>
        <a href="/rankings/womens/singles" class="tab-btn px-5 py-2 rounded-full border text-sm font-bold tracking-widest uppercase transition-all duration-200 {{if eq .ActiveTab "F-singles"}}bg-white text-black border-white{{else}}bg-transparent text-gray-400 border-white/20 hover:border-white/50 hover:text-white{{end}}">♀ Women's Singles</a>
        <a href="/rankings/mens/doubles" class="tab-btn px-5 py-2 rounded-full border text-sm font-bold tracking-widest uppercase transition-all duration-200 {{if eq .ActiveTab "M-doubles"}}bg-white text-black border-white{{else}}bg-transparent text-gray-400 border-white/20 hover:border-white/50 hover:text-white{{end}}">♂ Men's Doubles</a>
        <a href="/rankings/womens/doubles" class="tab-btn px-5 py-2 rounded-full border text-sm font-bold tracking-widest uppercase transition-all duration-200 {{if eq .ActiveTab "F-doubles"}}bg-white text-black border-white{{else}}bg-transparent text-gray-400 border-white/20 hover:border-white/50 hover:text-white{{end}}">♀ Women's Doubles</a>
        <a href="/rankings/mixed/doubles" class="tab-btn px-5 py-2 rounded-full border text-sm font-bold tracking-widest uppercase transition-all duration-200 {{if eq .ActiveTab "-doubles"}}bg-white text-black border-white{{else}}bg-transparent text-gray-400 border-white/20 hover:border-white/50 hover:text-white{{end}}">⚤ Mixed Doubles</a>
    </div>

    <div class="glass p-6 rounded-3xl border border-white/10 flex flex-col md:flex-row gap-4 items-end relative z-20">
        <div class="flex-1 min-w-[200px] w-full">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2 block">Search Player</label>
            <input type="text" 
                   name="q" 
                   value="{{.Query}}"
                   placeholder="Name or Country..." 
                   class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-white transition-colors placeholder:text-gray-600"
                   hx-get=""
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#rankings-tbody"
                   hx-include="#division-filter, #sort-order"
                   hx-push-url="true">
        </div>
        <div class="w-full md:w-48">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2 block">Filter Division</label>
            <select id="division-filter" 
                    name="division" 
                    class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-white transition-colors appearance-none cursor-pointer"
                    hx-get=""
                    hx-target="#rankings-tbody"
                    hx-include="[name='q'], #sort-order"
                    hx-push-url="true">
                <option value="all" {{if eq .Division "all"}}selected{{end}}>All Divisions</option>
                {{/* We need divisions list which we might not have in .Groups if they are filtered. Let's assume we have .Divisions */}}
                {{range .Divisions}}
                <option value="{{.Name}}" {{if eq .Name $.Division}}selected{{end}}>{{.Name}}</option>
                {{end}}
            </select>
        </div>
        <div class="w-full md:w-48">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-2 block">Sort Order</label>
            <select id="sort-order" 
                    name="sort" 
                    class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white focus:outline-none focus:border-white transition-colors appearance-none cursor-pointer"
                    hx-get=""
                    hx-target="#rankings-tbody"
                    hx-include="[name='q'], #division-filter"
                    hx-push-url="true">
                <option value="points_desc" {{if eq .Sort "points_desc"}}selected{{end}}>Points (High to Low)</option>
                <option value="points_asc" {{if eq .Sort "points_asc"}}selected{{end}}>Points (Low to High)</option>
                <option value="name_asc" {{if eq .Sort "name_asc"}}selected{{end}}>Name (A-Z)</option>
            </select>
        </div>
    </div>

    <div class="glass rounded-3xl overflow-hidden border border-white/10 shadow-2xl relative">
        <div class="absolute inset-0 bg-gradient-to-b from-white/3 to-transparent pointer-events-none"></div>
        <table class="w-full text-left border-collapse relative z-10">
            <thead>
                <tr class="bg-black/60 border-b border-white/15">
                    <th class="py-6 px-4 font-bold text-gray-300 uppercase text-xs tracking-widest w-24 text-center">Rank</th>
                    <th class="py-6 px-4 font-bold text-gray-300 uppercase text-xs tracking-widest">Player</th>
                    <th class="py-6 px-4 font-bold text-gray-300 uppercase text-xs tracking-widest text-center">Assoc.</th>
                    <th class="py-6 px-4 font-bold text-gray-300 uppercase text-xs tracking-widest text-right">Points</th>
                </tr>
            </thead>
            <tbody id="rankings-tbody" class="divide-y divide-white/5">
                {{template "partials/rankings-table" .}}
            </tbody>
        </table>
    </div>
</div>
