<h2 class="text-xl font-extrabold uppercase mb-1 tracking-tighter">{{t .T "score_pub.title"}} <span class="text-white">{{t .T "score_pub.score"}}</span></h2>
<p class="text-xs text-gray-500 mb-4 font-mono">
    {{.PlayerA}} vs {{.PlayerB}} · Bo{{.BestOf}}
    {{if .IsDoubles}}
    <br/>
    <span class="text-gray-400 font-sans mt-1.5 block leading-relaxed">
        <span class="text-white/60">{{t .T "score_pub.players"}}</span> {{.PlayerANames}} <span class="text-white/30">vs</span> {{.PlayerBNames}}
    </span>
    {{end}}
</p>

<form
    id="public-score-form"
    data-player-a="{{.PlayerA}}"
    data-player-b="{{.PlayerB}}"
    hx-post="/public/matches/score/update"
    hx-trigger="confirmed"
    hx-target="#public-score-result"
    hx-swap="innerHTML"
    class="space-y-3 mb-4">
    
    <input type="hidden" name="tournamentId" value="{{.TournamentID}}">
    <input type="hidden" name="stage" value="{{.Stage}}">
    <input type="hidden" name="matchId" value="{{.MatchID}}">
    <input type="hidden" name="p1Id" value="{{.P1Id}}">
    <input type="hidden" name="p2Id" value="{{.P2Id}}">
    <input type="hidden" name="pin" value="{{.Pin}}">

    <!-- Sets Scores -->
    <div class="space-y-2 mb-4">
        {{range .Sets}}
        <div class="flex items-center gap-3">
            <span class="text-[10px] font-bold text-gray-500 w-10 text-right uppercase tracking-widest">{{t $.T "score_pub.set"}} {{.Number}}</span>
            <input name="scores[]_a" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="99" placeholder="A" value="{{.ScoreA}}"
                class="flex-1 bg-white/[0.04] border border-white/10 rounded-xl p-4 text-white text-center text-2xl font-black focus:outline-none focus:border-white/30 transition-colors shadow-inner">
            <span class="text-gray-600 font-bold text-lg">–</span>
            <input name="scores[]_b" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="99" placeholder="B" value="{{.ScoreB}}"
                class="flex-1 bg-white/[0.04] border border-white/10 rounded-xl p-4 text-white text-center text-2xl font-black focus:outline-none focus:border-white/30 transition-colors shadow-inner">
        </div>
        {{end}}
    </div>

    <div id="public-score-result" class="hidden text-sm text-red-400 mb-2 font-mono text-center"></div>

    <div class="flex gap-3">
        <button type="button" 
            onclick="document.getElementById('public-score-modal').classList.add('hidden')"
            class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-400 hover:text-white font-bold py-4 rounded-2xl transition-all uppercase tracking-widest text-xs">
            {{t .T "score_pub.cancel"}}
        </button>
        <button type="submit" 
            class="flex-[2] bg-white hover:bg-gray-100 text-black font-black py-4 rounded-2xl transition-all uppercase tracking-widest shadow-lg text-xs">
            {{t .T "score_pub.submit"}}
        </button>
    </div>
</form>

<!-- Custom CSS Confirmation Modal -->
<div id="custom-confirm-modal" class="hidden fixed inset-0 z-[10000] flex items-center justify-center bg-black/80 backdrop-blur-md">
    <div class="bg-[#111] p-8 rounded-3xl border border-white/10 shadow-2xl max-w-sm w-full mx-4 transform transition-all text-center relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/5 rounded-full blur-3xl pointer-events-none"></div>
        <h3 class="text-xl font-black uppercase tracking-widest text-white mb-4">Confirm Score</h3>
        <p id="custom-confirm-msg" class="text-sm text-gray-400 font-mono mb-8 whitespace-pre-wrap leading-relaxed"></p>
        <div class="flex gap-4 relative z-10">
            <button type="button" onclick="document.getElementById('custom-confirm-modal').classList.add('hidden')" class="flex-1 bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl uppercase tracking-widest text-xs transition-colors border border-white/10">Cancel</button>
            <button type="button" onclick="document.getElementById('custom-confirm-modal').classList.add('hidden'); htmx.trigger('#public-score-form', 'confirmed');" class="flex-1 bg-green-500 hover:bg-green-400 text-black font-black py-3 rounded-xl uppercase tracking-widest text-xs transition-colors shadow-[0_0_15px_rgba(34,197,94,0.3)]">Confirm</button>
        </div>
    </div>
</div>

<script>
document.getElementById('public-score-form').addEventListener('submit', function(e) {
    e.preventDefault();
    let setsA = 0; let setsB = 0;
    let inputsA = this.querySelectorAll('input[name=\'scores[]_a\']');
    let inputsB = this.querySelectorAll('input[name=\'scores[]_b\']');
    let hasScores = false;
    
    for (let i = 0; i < inputsA.length; i++) {
        let a = parseInt(inputsA[i].value);
        let b = parseInt(inputsB[i].value);
        if (!isNaN(a) && !isNaN(b)) {
            hasScores = true;
            if (a > b) setsA++;
            else if (b > a) setsB++;
        }
    }
    
    if (hasScores) {
        let pA = this.getAttribute('data-player-a');
        let pB = this.getAttribute('data-player-b');
        let msg = "Are you sure the result is:\n\n";
        
        if (setsA > setsB) {
            msg += `<span class="text-white font-bold">${pA}</span> wins <span class="text-green-400 font-black">${setsA} - ${setsB}</span> over <span class="text-white font-bold">${pB}</span>`;
        } else if (setsB > setsA) {
            msg += `<span class="text-white font-bold">${pB}</span> wins <span class="text-green-400 font-black">${setsB} - ${setsA}</span> over <span class="text-white font-bold">${pA}</span>`;
        } else {
            msg += `Tie <span class="text-yellow-400 font-black">${setsA} - ${setsB}</span>`;
        }
        
        document.getElementById('custom-confirm-msg').innerHTML = msg;
        document.getElementById('custom-confirm-modal').classList.remove('hidden');
    } else {
        htmx.trigger(this, 'confirmed');
    }
});

// Show error div when it has content
document.getElementById('public-score-result').addEventListener('DOMSubtreeModified', function() {
    if (this.textContent.trim() !== '') {
        this.classList.remove('hidden');
    }
});
</script>
